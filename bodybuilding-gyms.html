<!DOCTYPE HTML>
<html>
	<head>
		<title>Bodybuilding Gyms | Set To Adapt</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

		<link rel="icon" type="image/png" href="images/favicon-64x64.png" />

		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

		<style>
    /* Reset html and body to prevent unwanted scrollbars on the main page wrapper */
    html, body, #page-wrapper {
        height: 100%;
        overflow: hidden !important;
        background: #1f1f2e;
    }

    /* Make the embedding section drop all padding so it is perfectly flush */
    .notion-embed-section {
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #1f1f2e;
    }

    .notion-embed-section .inner {
        max-width: 100% !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    /* The Cropping Container: Shifted UP by 45px to hide the top bar */
    .notion-wrapper {
        width: 100% !important;
        margin-top: -45px !important; /* Forces the entire block upward, hiding the top bar behind the banner */
        padding: 0 !important;
        background: #15151f;
        overflow: hidden !important; 
        height: calc(100vh - 4em + 45px) !important; /* Extends height to account for the shift */
    }

    /* Force the iframe to fill the adjusted wrapper space completely */
    iframe {
        width: 100% !important;
        height: 100% !important;
        border: none !important;
        display: block !important;
    }

    /* Layout check for mobile screens */
    @media screen and (max-width: 736px) {
        .notion-wrapper {
            margin-top: -45px !important;
            height: calc(100vh - 3.5em + 45px) !important;
        }
    }
</style>
	</head>

	<body class="is-preload">
		<div id="page-wrapper">

			<header id="header">
				<div class="header-container">
					<div class="logo-container">
						<a href="index.html">
							<img src="images/logo.transparent.png" alt="SetToAdapt Logo">
						</a>
					</div>
					<div class="title-container">
						<span class="site-title"><b>SET TO ADAPT</b></span>
					</div>
					<nav>
						<a href="#menu">Menu</a>
					</nav>
				</div>
			</header>
			
			<!-- Menu (Dynamically loaded via JavaScript) -->
<nav id="menu"></nav>

			<section id="wrapper">
				<section class="wrapper style1 notion-embed-section">
					<div class="inner">
						<div class="notion-wrapper">
							<iframe src="https://glacier-tennis-15c.notion.site/ebd//37aae52e4dd580a28a74edeef9512b14" allowfullscreen></iframe>
						</div>
					</div>
				</section>
			</section>

		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/jquery.scrollex.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
<!-- Shared Menu Loader Script -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                const menuEl = document.getElementById('menu');
                if (menuEl) {
                    menuEl.innerHTML = data;
                    
                    // Re-initialize template menu toggle logic
                    if (window.initMenu) {
                        window.initMenu();
                    } else if (typeof $ !== 'undefined' && $.fn.scrollex) {
                        $(window).trigger('resize');
                    }
                }
            })
            .catch(error => console.error('Error loading the shared menu:', error));
    });
</script>
	</body>
</html>
